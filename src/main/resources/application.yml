server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/plazoleta?useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  security:
    jwt:
      secret: ${PRAGMA_JWT_KEY}
